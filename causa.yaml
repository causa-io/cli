# yaml-language-server: $schema=.causa/configuration-schema.yaml

workspace:
  name: causa

project:
  name: cli
  description: Exposes the command line interface for the Causa (`cs`) command.
  language: typescript
  type: package

causa:
  modules:
    '@causa/workspace-core': '>= 0.27.0'
    '@causa/workspace-typescript': '>= 0.17.0'

javascript:
  dependencies:
    check:
      allowlist: []
    update:
      packageTargets:
        '@types/node': minor
